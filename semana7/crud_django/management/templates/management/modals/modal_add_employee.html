<div class="modal fade" id="addEmployeeModal" tabindex="-1">
    <!-- El ID del modal es "addEmployeeModal" para que coincida con el botón que lo activa -->
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="{% url 'employee_create' %}">
                <!-- El formulario se enviará a la URL 'employee_create' para crear un nuevo empleado -->
                {% csrf_token %} <!-- Agrega el token CSRF para proteger contra ataques CSRF  -->
                <div class="modal-header">
                    <h5 class="modal-title">Agregar Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    {{ form.as_p }} <!-- Renderiza el formulario de empleado   -->
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
